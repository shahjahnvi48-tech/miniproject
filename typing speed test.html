<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Test</title>
<link rel="stylesheet" href="typing.css">
</head>
<body>

<div class="container">
    <h1>⌨️ Typing Speed Test</h1>

    <p id="quote">
        The quick brown fox jumps over the lazy dog. Practice typing every day to improve your typing speed and accuracy.
    </p>

    <textarea id="input" placeholder="Start typing here..."></textarea>

    <div class="info">
        <p>Time: <span id="time">60</span>s</p>
        <p>WPM: <span id="wpm">0</span></p>
        <p>Accuracy: <span id="accuracy">100</span>%</p>
    </div>

    <button onclick="restartTest()">Restart</button>
</div>

<script src="typing.js"></script>

</body>
</html>
