<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:450px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    border:2px solid #ccc;
    border-radius:8px;
    resize:none;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#388E3C;
}

.note{
    background:#fff9b0;
    margin-top:15px;
    padding:12px;
    border-left:5px solid orange;
    border-radius:8px;
    position:relative;
    word-wrap:break-word;
}

.note button{
    width:auto;
    padding:5px 10px;
    margin-top:10px;
    background:red;
}

.note button:hover{
    background:darkred;
}
</style>

</head>





















<body>

<div class="container">

<h1>Notes App</h1>

<textarea id="text" placeholder="Write your note..."></textarea>

<button onclick="addNote()">Add Note</button>

<div id="notes"></div>

</div>













<script>

let notes = JSON.parse(localStorage.getItem("notes")) || [];

displayNotes();

function addNote(){

    let text = document.getElementById("text").value;

    if(text==""){
        alert("Please enter a note");
        return;
    }

    notes.push(text);

    localStorage.setItem("notes", JSON.stringify(notes));

    document.getElementById("text").value="";

    displayNotes();
}

function displayNotes(){

    let output="";

    for(let i=0;i<notes.length;i++){

        output += `
        <div class="note">
            <p>${notes[i]}</p>
            <button onclick="deleteNote(${i})">Delete</button>
        </div>
        `;
    }

    document.getElementById("notes").innerHTML=output;
}

function deleteNote(index){

    notes.splice(index,1);

    localStorage.setItem("notes", JSON.stringify(notes));

    displayNotes();
}

</script>

</body>
</html>
