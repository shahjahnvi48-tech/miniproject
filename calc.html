<!DOCTYPE html>
<html>
<head>
    <title>Calculator with Log</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        .calculator{
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 2px solid black;
            border-radius: 10px;
        }

        input, select, button{
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        #result{
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Calculator</h2>

    <input type="number" id="num1" placeholder="Enter first number">

    <select id="operator">
        <option value="+">Addition (+)</option>
        <option value="-">Subtraction (-)</option>
        <option value="*">Multiplication (*)</option>
        <option value="/">Division (/)</option>
        <option value="%">Modulus (%)</option>
        <option value="log">Log</option>
    </select>

    <input type="number" id="num2" placeholder="Enter second number (not needed for Log)">

    <button onclick="calculate()">Calculate</button>

    <h3 id="result">Result:</h3>
</div>

<script>
function calculate() {
    let num1 = Number(document.getElementById("num1").value);
    let num2 = Number(document.getElementById("num2").value);
    let op = document.getElementById("operator").value;
    let result;

    switch(op) {
        case "+":
            result = num1 + num2;
            break;

        case "-":
            result = num1 - num2;
            break;

        case "*":
            result = num1 * num2;
            break;

        case "/":
            result = num1 / num2;
            break;

        case "%":
            result = num1 % num2;
            break;

        case "log":
            result = Math.log10(num1);
            break;
    }

    document.getElementById("result").innerHTML =
        "Result: " + result;
}
</script>

</body>
</html>
