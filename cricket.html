<!DOCTYPE html>
<html>
<head>
    <title>Simple Cricket Ground</title>
    <link rel="stylesheet" href="cricket.css">
</head>
<body>

<h2>Cricket Ground</h2>

<div class="ground">

    <!-- Pitch -->
    <div class="pitch"></div>

    <!-- Batsman -->
    <div class="batsman"></div>

    <!-- Bowler -->
    <div class="bowler"></div>

    <!-- Ball -->
    <div class="ball" id="ball"></div>

    <!-- Fielders -->
    <div class="fielder f1"></div>
    <div class="fielder f2"></div>
    <div class="fielder f3"></div>
    <div class="fielder f4"></div>
    <div class="fielder f5"></div>
    <div class="fielder f6"></div>
    <div class="fielder f7"></div>
    <div class="fielder f8"></div>

</div>

<button onclick="bowl()">Bowl Ball</button>

<script src="cricket.js"></script>

</body>
</html>
