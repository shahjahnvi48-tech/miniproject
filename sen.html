<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Translator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:450px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:none;
}

select{
    width:100%;
    margin-top:15px;
    padding:10px;
    font-size:16px;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f4f4f4;
    border-radius:10px;
    min-height:70px;
    text-align:left;
}

.result h3{
    margin-bottom:10px;
    
}
</style>

</head>
<body>

<div class="container">

<h1>🌍 Sentence Translator</h1>

<textarea id="text" placeholder="Type your sentence here..."></textarea>

<select id="language">
<option value="hi">Hindi</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
<option value="de">German</option>
<option value="it">Italian</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="ru">Russian</option>
</select>

<button onclick="translateSentence()">Translate</button>

<div class="result">
<h3>Translated Text:</h3>
<p id="output">Your translation will appear here.</p>
</div>

</div>

<script>
async function translateSentence(){

    let text=document.getElementById("text").value;
    let lang=document.getElementById("language").value;
    let output=document.getElementById("output");
        if(text.trim()==""){
        alert("Please enter a sentence.");
        return;
    }

    output.innerHTML="Translating...";

    let url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${lang}`;

    try{
        let response=await fetch(url);
        let data=await response.json();

        output.innerHTML=data.responseData.translatedText;
    }
    catch(error){
        output.innerHTML="Translation failed. Please check your internet connection.";
    }
}
</script>

</body>
</html>
