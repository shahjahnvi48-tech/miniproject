<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#74ebd5,#ACB6E5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

.input-box{
    display:flex;
    flex-direction:column;
    gap:10px;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

.total{
    margin:20px 0;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#007bff;
}

ul{
    list-style:none;
    max-height:250px;
    overflow-y:auto;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f5f5f5;
    margin:10px 0;
    padding:12px;
    border-radius:8px;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
}

.delete:hover{
    background:darkred;
}
</style>

</head>
<body>

<div class="container">

<h1>💰 Expense Tracker</h1>

<div class="input-box">
<input type="text" id="expense" placeholder="Expense Name">
<input type="number" id="amount" placeholder="Amount">
<button onclick="addExpense()">Add Expense</button>
</div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<ul id="list"></ul>

</div>

<script src="ex.js"></script>

</body>
</html>
