<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#36D1DC,#5B86E5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    color:green;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>💱 Currency Converter</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="from">
    <option value="1">Indian Rupee (INR)</option>
    <option value="83">US Dollar (USD)</option>
    <option value="105">Euro (EUR)</option>
    <option value="97">British Pound (GBP)</option>
</select>

<select id="to">
    <option value="1">Indian Rupee (INR)</option>
    <option value="83">US Dollar (USD)</option>
    <option value="105">Euro (EUR)</option>
    <option value="97">British Pound (GBP)</option>
</select>

<button onclick="convert()">Convert</button>

<div id="result"></div>

</div>

<script src="currency.js"></script>

</body>
</html>
