<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:380px;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:16px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#qrBox{
    margin-top:20px;
}

img{
    margin-top:15px;
    border:5px solid #eee;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 QR Code Generator</h2>

<input type="text" id="text" placeholder="Enter text or URL">

<button onclick="generateQR()">Generate QR Code</button>

<div id="qrBox">
    <img id="qrImage" src="" style="display:none;">
</div>

</div>

<script>

function generateQR(){

    let text = document.getElementById("text").value.trim();

    if(text==""){
        alert("Please enter some text.");
        return;
    }

    let qr = document.getElementById("qrImage");

    qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(text);

    qr.style.display = "block";
}

</script>

</body>
</html>
